name: Update SportTV1 Link

on:
  schedule:
    - cron: "*/30 * * * *" # Corre a cada 30 minutos
  workflow_dispatch: # Permite correr manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Chrome, XVFB e Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install undetected-chromedriver selenium-wire webdriver-manager blinker==1.7.0 requests

      - name: Executar Extração com Ecrã Virtual
        # O xvfb-run cria um monitor virtual para o Chrome poder abrir
        run: xvfb-run --auto-servernum python extrair_link.py

      - name: Publicar Alterações no GitHub
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@github.com"
          git add sporttv1.m3u
          # O commit só acontece se o ficheiro tiver mudado
          git commit -m "Auto Update: $(date +'%H:%M')" || echo "Sem alterações para publicar"
          git push
