name: Update SportTV1 Link

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install selenium-wire webdriver-manager blinker==1.7.0

      - name: Executar Extração (Network Sniffer)
        run: python extrair_link.py

      - name: Publicar
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@github.com"
          if [ -f sporttv1.m3u ]; then
            git add sporttv1.m3u
            git commit -m "Auto Update" || echo "Sem mudanças"
            git push
          else
            exit 1
          fi
