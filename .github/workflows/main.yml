name: Update SportTV Link
on:
  workflow_dispatch:
  schedule:
    - cron: '0,19,38,57 * * * *' # Atualiza a cada 3 horas

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão para gravar no repo
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python e Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Scraper
        run: python extrair_link.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sporttv1.m3u8
          git commit -m "Atualizado link SportTV 1" || exit 0
          git push
          
