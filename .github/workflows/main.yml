name: Update SportTV1 Link

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Chrome e XVFB
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install undetected-chromedriver requests

      - name: Executar Extração com Ecrã Virtual
        run: xvfb-run --auto-servernum python extrair_link.py

      - name: Publicar
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@github.com"
          if [ -f sporttv1.m3u ]; then
            git add sporttv1.m3u
            git commit -m "Update SportTV1: $(date +'%H:%M')" || echo "Sem mudanças"
            git push
          else
            exit 1
          fi
