name: Atualizador IPTV Dzeko11 Stealth

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias do Python
      run: |
        pip install playwright

    - name: Instalar Navegador Chromium
      run: |
        playwright install chromium --with-deps

    - name: Executar Script de Captura
      run: python extrair_link.py

    - name: Commitar e dar Push na Playlist
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        if git diff --quiet sporttv2.m3u; then
          echo "Nenhuma alteracao detetada na playlist."
        else
          git add sporttv2.m3u
          git commit -m "Playlist atualizada automaticamente com novo Token"
          git push
        fi
