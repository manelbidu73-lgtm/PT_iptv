name: Atualizar Token TVI

on:
  schedule:
    - cron: '0 */4 * * *' # Atualiza automaticamente de 4 em 4 horas
  workflow_dispatch:      # Permite-te clicar no botão "Run workflow" para testar agora

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Importante para permitir que a Action salve o ficheiro
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar o script de extração
        run: python extrair_link.py

      - name: Guardar o ficheiro tvi.m3u8 no repositório
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add tvi.m3u8
          git commit -m "Auto: Token da TVI atualizado" || exit 0
          git push
