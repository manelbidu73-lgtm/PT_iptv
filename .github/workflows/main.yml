name: Atualizador IPTV Dzeko11 Stealth

# Define os gatilhos de execução
on:
  schedule:
    # Executa automaticamente a cada 3 horas (Ajuste o cron se o token durar menos)
    - cron: '0 */1 * * *'
  workflow_dispatch: # Permite que você clique no botão "Run workflow" para testar manualmente

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do seu repositório GitHub para a máquina virtual
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura o ambiente Python no servidor do GitHub
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala o Playwright e as ferramentas de camuflagem (Stealth) contra o Cloudflare
    - name: Instalar dependências do Python
      run: |
        pip install playwright playwright-extra playwright-extra-plugin-stealth

    # 4. Baixa o navegador Chromium e instala as dependências de sistema do Linux (--with-deps)
    - name: Instalar Navegador Chromium e dependências do sistema
      run: |
        playwright install chromium --with-deps

    # 5. Executa o script potente que criamos no passo anterior
    # (Certifique-se de que o nome do arquivo abaixo coincide com o seu script)
    - name: Executar Script de Captura Furtiva
      run: python extrair_link.py

    # 6. Salva o arquivo playlist.m3u atualizado de volta no seu repositório
    - name: Commitar e dar Push na Playlist atualizada
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions Bot"
        
        # Verifica se o arquivo sporttv2.m3u realmente foi gerado ou modificado
        if git diff --quiet sporttv2.m3u; then
          echo "Nenhuma alteração detetada na playlist."
        else
          git add playlist.m3u
          git commit -m "Playlist atualizada automaticamente com novo Token"
          git push
        fi
