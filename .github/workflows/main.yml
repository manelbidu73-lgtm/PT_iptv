name: Update SportTV1 Link

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Requests
        run: pip install requests

      - name: Executar Extração
        run: python extrair_link.py

      - name: Publicar Alterações
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@github.com"
          if [ -f sporttv1.m3u ]; then
            git add sporttv1.m3u
            git commit -m "Auto Update $(date +'%H:%M')" || echo "Sem mudanças"
            git push
          else
            exit 1
          fi
