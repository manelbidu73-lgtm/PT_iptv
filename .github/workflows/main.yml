name: Update SportTV1 Link

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install seleniumbase selenium-wire blinker==1.7.0

      - name: Executar Extração
        # O SeleniumBase trata do XVFB sozinho se usares xvfb=True no código
        run: python extrair_link.py

      - name: Publicar
        run: |
          git config --global user.name "IPTV Bot"
          git config --global user.email "bot@github.com"
          git add sporttv1.m3u
          git commit -m "Auto Update $(date +'%H:%M')" || echo "Sem mudanças"
          git push
